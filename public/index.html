<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mygez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1a1a1e;
      --border: #242428;
      --accent: #439BD1;
      --accent-dim: #439BD112;
      --text: #e2eaf4;
      --muted: #4d6480;
      --success: #34d399;
      --error: #f87171;
      --warn: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
      margin-left: auto;
    }
    #status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    #status-dot.err { background: var(--error);   box-shadow: 0 0 6px var(--error); }

    .layout {
      display: flex;
      height: calc(100vh - 52px);
    }

    nav {
      width: 185px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    nav button {
      background: none;
      border: none;
      color: var(--muted);
      text-align: left;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid #38bdf830;
    }

    .separator { height: 1px; background: var(--border); margin: 8px 0; }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--surface);
    }

    .toolbar label { color: var(--muted); font-size: 12px; font-weight: 500; }

    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: #080c14;
      border: none;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }

    .content { flex: 1; display: flex; overflow: hidden; }

    .result-panel { flex: 1; overflow: auto; padding: 20px; }


    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow: auto;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .pretty-container { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
    }

    .card h3 {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: var(--accent);
    }

    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 5px 20px; }
    .kv .k { color: var(--muted); font-size: 12px; }
    .kv .v { color: var(--text); word-break: break-all; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.green  { background: #34d39918; color: var(--success); }
    .badge.red    { background: #f8717118; color: var(--error); }
    .badge.yellow { background: #fbbf2418; color: var(--warn); }
    .badge.blue   { background: var(--accent-dim); color: var(--accent); }

    .loading {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #f8717110;
      border: 1px solid #f8717130;
      border-radius: 10px;
      padding: 16px;
      color: var(--error);
      font-size: 13px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 9px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: .5px;
      text-transform: uppercase;
      background: var(--bg);
    }
    td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }

    tfoot tr td, tfoot tr th { border-top: 1px solid var(--border); border-bottom: none; }

    .raw-path { flex: 1; max-width: 360px; }

    #endpoint-label {
      font-weight: 700;
      color: var(--text);
      font-size: 14px;
      letter-spacing: .2px;
    }

    .sem-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      margin-bottom: 14px;
    }
    .sem-header h3 { margin-bottom: 0; }
    .sem-chevron { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .sem-card.collapsed .sem-chevron { transform: rotate(-90deg); }
    .sem-card.collapsed .sem-body { display: none; }
    .sem-card.collapsed .sem-header { margin-bottom: 0; }
    .sem-card.filter-graded .has-no-grade { display: none; }

    .sem-export-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s;
      flex-shrink: 0;
    }
    .sem-export-btn:hover { color: var(--accent); }

    @media print {
      body.printing nav,
      body.printing .toolbar,
      body.printing .sem-card { display: none !important; }
      body.printing .sem-card.printing-target { display: block !important; }
      body.printing .sem-card.printing-target .sem-body { display: block !important; }
      body.printing .sem-card.printing-target .sem-header { margin-bottom: 14px !important; }
      body.printing .layout { display: block; }
      body.printing .main { padding: 8px; }
      .sem-export-btn, .sem-chevron { display: none !important; }
      .grades-cards { display: none !important; }
      .grades-table { display: table !important; }
    }

    .grade-filter { display: flex; gap: 4px; }
    .grade-filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .grade-filter-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: #38bdf830;
    }

    .grades-cards { display: none; }

    .course-card {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    .course-card:last-child { border-bottom: none; padding-bottom: 0; }
    .course-card:first-child { padding-top: 0; }
    .course-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .course-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .course-grades { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .grade-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .grade-label { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; }
    .course-card-inner { display: flex; align-items: center; gap: 12px; }
    .course-card-left { flex: 1; min-width: 0; }
    .course-card-avg { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
    .course-card-avg .badge { font-size: 14px; padding: 4px 12px; }
    .grade-item.avg .badge { font-size: 13px; padding: 3px 11px; }

    .nav-icon { display: none; }

    @media (max-width: 768px) {
      nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        flex-direction: row;
        align-items: stretch;
        border-right: none;
        border-top: 1px solid var(--border);
        padding: 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        height: calc(60px + env(safe-area-inset-bottom, 0px));
        z-index: 100;
        gap: 0;
      }

      .separator { display: none; }

      nav button {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 6px 4px 4px;
        border-radius: 0;
        font-size: 10px;
        font-weight: 500;
        text-align: center;
        white-space: normal;
        line-height: 1.2;
      }

      nav button.active {
        border: none;
        border-top: 2px solid var(--accent);
      }

      .nav-icon { display: block; }

      .layout { height: calc(100vh - 52px); }

      .result-panel {
        padding: 12px;
        padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px) + 16px);
      }

      .card { overflow-x: auto; }

      header { padding: 0 12px; }

      .toolbar { padding: 8px 12px; gap: 8px; }

      table { font-size: 12px; }
      th, td { padding: 7px 8px; }

      .grades-table { display: none; }
      .grades-cards { display: block; }

      .raw-path { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>my<span>gez</span></h1>
  <div id="status-dot"></div>
</header>

<div class="layout">
  <nav>
    <button class="active" data-endpoint="grades">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="17" rx="1"/></svg>
      Notes
    </button>
    <button data-endpoint="absences">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Absences
    </button>
    <div class="separator"></div>
    <button data-endpoint="teachers">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profs
    </button>
    <button data-endpoint="courses">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Cours
    </button>
    <div class="separator"></div>
    <button data-endpoint="raw">
      <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Requête
    </button>
  </nav>

  <div class="main">
    <div class="toolbar" id="toolbar">
      <span id="endpoint-label">Notes</span>
      <div style="flex:1"></div>
      <select id="year-select">
        <option value="2025">2ème année</option>
        <option value="2024">1ère année</option>
      </select>
      <button class="btn" id="fetch-btn" style="padding:6px 10px;display:flex;align-items:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>

    <div class="content">
      <div class="result-panel">
        <div id="view-pretty">
          <p style="color:var(--muted)">Sélectionne un endpoint et clique sur Charger.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const LABELS = {
  grades: "Notes",
  absences: "Absences",
  teachers: "Professeurs",
  courses: "Cours",
  raw: "Requête libre",
};

let currentEndpoint = "grades";

// --- Nav ---
document.querySelectorAll("nav button[data-endpoint]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentEndpoint = btn.dataset.endpoint;
    document.getElementById("endpoint-label").textContent = LABELS[currentEndpoint];
    updateToolbar();
    if (currentEndpoint !== "raw") fetchData();
  });
});

function updateToolbar() {
  const tb = document.getElementById("toolbar");
  document.getElementById("raw-path-input")?.remove();
  document.getElementById("raw-path-label")?.remove();
  document.getElementById("grade-filter")?.remove();

  const label = document.getElementById("endpoint-label");
  const yearSelect = document.getElementById("year-select");

  const noYear = ["profile", "news", "agenda"].includes(currentEndpoint);
  yearSelect.style.display = noYear ? "none" : "";

  if (currentEndpoint === "grades") {
    label.style.display = "none";
    const div = document.createElement("div");
    div.id = "grade-filter";
    div.className = "grade-filter";
    div.innerHTML = `<button class="grade-filter-btn active" data-filter="all">Voir tout</button><button class="grade-filter-btn" data-filter="graded">Voir notes</button>`;
    tb.insertBefore(div, tb.querySelector("div[style]"));
    div.addEventListener("click", e => {
      const btn = e.target.closest(".grade-filter-btn");
      if (!btn) return;
      div.querySelectorAll(".grade-filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const graded = btn.dataset.filter === "graded";
      document.querySelectorAll(".sem-card").forEach(c => c.classList.toggle("filter-graded", graded));
    });
  } else {
    label.style.display = "";
  }

  if (currentEndpoint === "raw") {
    const lbl = document.createElement("label");
    lbl.id = "raw-path-label";
    lbl.textContent = "Path";
    const inp = document.createElement("input");
    inp.id = "raw-path-input";
    inp.className = "raw-path";
    inp.placeholder = "/me/grades?year=2025";
    inp.value = "/me/grades?year=2025";
    const fetchBtn = document.getElementById("fetch-btn");
    tb.insertBefore(inp, fetchBtn);
    tb.insertBefore(lbl, inp);
    yearSelect.style.display = "none";
  }
}

// --- Fetch ---
document.getElementById("fetch-btn").addEventListener("click", fetchData);
document.addEventListener("keydown", e => { if (e.key === "Enter") fetchData(); });

async function fetchData() {
  const year = document.getElementById("year-select").value;
  let url;

  if (currentEndpoint === "raw") {
    const path = document.getElementById("raw-path-input")?.value?.trim();
    if (!path) return;
    url = `/api/raw?path=${encodeURIComponent(path)}`;
  } else {
    url = `/api/${currentEndpoint}?year=${year}`;
  }

  showLoading();
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || "Erreur inconnue", data.detail);
    } else {
      showData(data);
      setStatus("ok");
    }
  } catch (e) {
    showError(e.message);
    setStatus("err");
  }
}

function setStatus(s) {
  const dot = document.getElementById("status-dot");
  dot.className = s;
}

function showLoading() {
  document.getElementById("view-pretty").innerHTML = `<div class="loading"><div class="spinner"></div> Chargement…</div>`;
}

function showError(msg, detail) {
  setStatus("err");
  document.getElementById("view-pretty").innerHTML =
    `<div class="error-box"><b>Erreur :</b> ${msg}${detail ? `<pre style="margin-top:8px;background:none;border:none;padding:0;color:inherit">${JSON.stringify(detail, null, 2)}</pre>` : ""}</div>`;
}

function showData(data) {
  const pretty = document.getElementById("view-pretty");

  try {
    switch (currentEndpoint) {
      case "profile":   pretty.innerHTML = renderProfile(data); break;
      case "grades":    pretty.innerHTML = renderGrades(data); break;
      case "absences":  pretty.innerHTML = renderAbsences(data); break;
      case "agenda":    pretty.innerHTML = renderAgenda(data); break;
      case "news":      pretty.innerHTML = renderNews(data); break;
      case "teachers":  pretty.innerHTML = renderTeachers(data); break;
      case "courses":   pretty.innerHTML = renderCourses(data); break;
      case "students":  pretty.innerHTML = renderStudents(data); break;
      default:          pretty.innerHTML = renderGeneric(data); break;
    }
  } catch (e) {
    pretty.innerHTML = renderGeneric(data);
  }
}

// --- Renderers ---
function kv(pairs) {
  return `<div class="kv">${pairs.filter(([,v]) => v != null && v !== "").map(([k,v]) =>
    `<span class="k">${k}</span><span class="v">${v}</span>`).join("")}</div>`;
}

function renderProfile(d) {
  const r = d.result || d;
  return `<div class="card"><h3>Profil étudiant</h3>${kv([
    ["Nom", `${r.firstname || ""} ${r.lastname || ""}`],
    ["Email", r.email],
    ["Login", r.login || r.username],
    ["Promo", r.promo || r.promotion],
    ["Campus", r.campus],
    ["Filière", r.major || r.filiere],
    ["Statut", r.status],
  ])}</div>`;
}

function renderGrades(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucune note trouvée.</p>`;

  // Grouper par semestre
  const bySemester = {};
  for (const c of results) {
    const s = c.trimester_name || "Autre";
    if (!bySemester[s]) bySemester[s] = [];
    bySemester[s].push(c);
  }

  return Object.entries(bySemester)
    .filter(([, courses]) => courses.some(c => c.grades?.length || c.exam != null || c.average != null))
    .sort(([a], [b]) => (parseInt(b.match(/\d+/)?.[0] ?? 0) - parseInt(a.match(/\d+/)?.[0] ?? 0)))
    .map(([sem, courses], i) => `
    <div class="card sem-card${i === 0 ? '' : ' collapsed'}" style="margin-bottom:20px">
      <div class="sem-header">
        <div style="display:flex;align-items:center;gap:8px">
          <h3>${sem}</h3>
          <button class="grade-filter-btn sem-export-btn" onclick="exportSemester(event, this)" title="Exporter en PDF" style="display:flex;align-items:center;gap:5px">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            Exporter
          </button>
        </div>
        <svg class="sem-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sem-body">
        <table class="grades-table">
          <thead><tr><th>Matière</th><th>Prof</th><th>CC</th><th>Partiel</th><th>Moyenne</th><th>Coef</th></tr></thead>
          <tbody>${courses.map(c => { const ng = !c.grades?.length && c.exam == null && c.average == null; return `
            <tr${ng ? ' class="has-no-grade"' : ''}>
              <td style="max-width:220px">${c.course || "—"}</td>
              <td style="color:var(--muted)">${c.teacher_first_name || ""} ${c.teacher_last_name || ""}</td>
              <td>${c.grades?.length ? c.grades.map(g => grade(g)).join(" ") : "—"}</td>
              <td>${c.exam != null ? grade(c.exam) : "—"}</td>
              <td>${grade(liveAverage(c))}</td>
              <td style="color:var(--muted)">${c.ects || "—"}</td>
            </tr>`; }).join("")}
          </tbody>
          <tfoot>${(() => {
            const withAvg = courses.filter(c => liveAverage(c) != null && parseFloat(c.coef) > 0);
            if (!withAvg.length) return "";
            const totalCoef = withAvg.reduce((s, c) => s + parseFloat(c.coef), 0);
            const weighted = withAvg.reduce((s, c) => s + liveAverage(c) * parseFloat(c.coef), 0) / totalCoef;
            return `<tr style="font-weight:600;border-top:2px solid var(--border)">
              <td colspan="4" style="text-align:right;color:var(--muted)">Moyenne générale</td>
              <td>${grade(weighted)}</td>
              <td></td>
            </tr>`;
          })()}</tfoot>
        </table>
        <div class="grades-cards">${courses.map(c => {
          const teacher = [c.teacher_first_name, c.teacher_last_name].filter(Boolean).join(" ");
          const ccGrades = c.grades || [];
          const ccLabels = ccGrades.length <= 1 ? ["CC"] : ccGrades.map((_, i) => `CC${i + 1}`);
          const emptyBadge = `<span class="badge" style="background:var(--surface2);color:var(--muted)">—</span>`;
          const ng = !ccGrades.length && c.exam == null && c.average == null;
          return `<div class="course-card${ng ? ' has-no-grade' : ''}">
            <div class="course-card-inner">
              <div class="course-card-left">
                <div class="course-name">${c.course || "—"}</div>
                <div class="course-meta">${teacher || "—"} · Coef. ${c.ects || "—"}</div>
                <div class="course-grades">
                  ${ccGrades.length ? ccGrades.map((g, i) => `<div class="grade-item"><span class="grade-label">${ccLabels[i]}</span>${grade(g)}</div>`).join("") : `<div class="grade-item"><span class="grade-label">CC</span>${emptyBadge}</div>`}
                  <div class="grade-item"><span class="grade-label">Partiel</span>${c.exam != null ? grade(c.exam) : emptyBadge}</div>
                </div>
              </div>
              <div class="course-card-avg">
                <span class="grade-label">Moy.</span>
                ${liveAverage(c) != null ? grade(liveAverage(c)) : emptyBadge}
              </div>
            </div>
          </div>`;
        }).join("")}${(() => {
          const withAvg = courses.filter(c => liveAverage(c) != null && parseFloat(c.coef) > 0);
          if (!withAvg.length) return "";
          const totalCoef = withAvg.reduce((s, c) => s + parseFloat(c.coef), 0);
          const weighted = withAvg.reduce((s, c) => s + liveAverage(c) * parseFloat(c.coef), 0) / totalCoef;
          return `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:600"><span>Moyenne générale</span>${grade(weighted)}</div>`;
        })()}</div>
      </div>
    </div>`).join("");
}

function liveAverage(c) {
  if (c.average != null) return c.average;
  const parts = [];
  if (c.grades?.length) parts.push(c.grades.reduce((s, g) => s + parseFloat(g), 0) / c.grades.length);
  if (c.exam != null) parts.push(parseFloat(c.exam));
  if (!parts.length) return null;
  return parts.reduce((s, g) => s + g, 0) / parts.length;
}

function grade(v) {
  if (v == null) return "—";
  const n = parseFloat(v);
  const cls = n >= 10 ? "green" : "red";
  return `<span class="badge ${cls}">${n % 1 === 0 ? n : n.toFixed(2)}</span>`;
}

function letterColor(l) {
  if (!l || l === "F") return "red";
  if (l.startsWith("A")) return "green";
  if (l.startsWith("B")) return "blue";
  return "yellow";
}

function renderAbsences(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucune absence trouvée.</p>`;

  const justified   = results.filter(a => a.justified).length;
  const unjustified = results.length - justified;

  return `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="card" style="text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--text)">${results.length}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Total</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--success)">${justified}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Justifiées</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--error)">${unjustified}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Non justifiées</div>
      </div>
    </div>
    <div class="card"><table>
      <thead><tr><th>Date</th><th>Cours</th><th>Justifiée</th><th>Motif</th></tr></thead>
      <tbody>${results.map(a => `<tr>
        <td>${a.date ? new Date(a.date).toLocaleDateString("fr-FR") : "—"}</td>
        <td>${a.course || a.name || "—"}</td>
        <td>${a.justified ? '<span class="badge green">Oui</span>' : '<span class="badge red">Non</span>'}</td>
        <td>${a.reason || a.motif || "—"}</td>
      </tr>`).join("")}</tbody>
    </table></div>`;
}

function renderAgenda(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucun événement cette semaine.</p>`;
  return `<div class="pretty-container">${results.map(ev => `
    <div class="card">${kv([
      ["Cours", ev.name || ev.discipline],
      ["Date", ev.start_date ? new Date(ev.start_date).toLocaleString("fr-FR") : "—"],
      ["Fin",  ev.end_date   ? new Date(ev.end_date).toLocaleString("fr-FR")   : "—"],
      ["Salle", ev.rooms?.map(r=>r.name||r).join(", ") || ev.room],
      ["Prof", ev.teachers?.map(t=>`${t.firstname} ${t.lastname}`).join(", ") || ev.teacher],
    ])}</div>`).join("")}`;
}

function renderNews(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucune actualité.</p>`;
  return `<div class="pretty-container">${results.map(n => `
    <div class="card">
      <h3>${n.title || "Sans titre"}</h3>
      <p style="color:var(--muted);font-size:12px;margin-bottom:8px">${n.date ? new Date(n.date).toLocaleDateString("fr-FR") : ""}</p>
      <p style="line-height:1.6">${n.content || n.body || ""}</p>
    </div>`).join("")}`;
}

function renderTeachers(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucun professeur trouvé.</p>`;
  return `<div class="card"><table>
    <thead><tr><th>Prénom</th><th>Nom</th><th>Email</th></tr></thead>
    <tbody>${results.map(t => {
      const photo = t.links?.find(l=>l.rel==="photo")?.href;
      return `<tr>
        <td>${photo ? `<img src="${photo}" style="width:28px;height:28px;border-radius:50%;margin-right:8px;vertical-align:middle" onerror="this.remove()">` : ""}${t.firstname||"—"}</td>
        <td>${t.lastname||"—"}</td>
        <td>${t.email||"—"}</td>
      </tr>`;
    }).join("")}</tbody>
  </table></div>`;
}

function renderCourses(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucun cours trouvé.</p>`;
  return `<div class="card"><table>
    <thead><tr><th>Cours</th><th>Coef.</th><th>Crédits</th></tr></thead>
    <tbody>${results.map(c => `<tr>
      <td>${c.name || c.discipline || "—"}</td>
      <td>${c.coef ?? c.coefficient ?? "—"}</td>
      <td>${c.credits ?? c.ects ?? "—"}</td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

function renderStudents(d) {
  const results = d.result || (Array.isArray(d) ? d : []);
  if (!results.length) return `<p style="color:var(--muted)">Aucun étudiant trouvé.</p>`;
  return `<div class="card"><table>
    <thead><tr><th>Prénom</th><th>Nom</th><th>Email</th></tr></thead>
    <tbody>${results.slice(0, 100).map(s => `<tr>
      <td>${s.firstname||"—"}</td>
      <td>${s.lastname||"—"}</td>
      <td>${s.email||"—"}</td>
    </tr>`).join("")}
    ${results.length > 100 ? `<tr><td colspan="3" style="color:var(--muted)">… et ${results.length - 100} autres</td></tr>` : ""}
    </tbody>
  </table></div>`;
}

function renderGeneric(d) {
  return `<div class="pretty-container">${renderValue(d)}</div>`;
}

function renderValue(v, depth=0) {
  if (Array.isArray(v)) {
    if (v.length === 0) return `<span style="color:var(--muted)">[]</span>`;
    return `<div class="card">${v.map((item, i) =>
      `<div style="margin-bottom:${i<v.length-1?8:0}px">${renderValue(item, depth+1)}</div>`
    ).join("")}</div>`;
  }
  if (v && typeof v === "object") {
    return `<div class="kv">${Object.entries(v).map(([k, val]) =>
      `<span class="k">${k}</span><span class="v">${
        typeof val === "object" && val !== null
          ? `<pre style="background:none;border:none;padding:0;font-size:11px">${JSON.stringify(val,null,2)}</pre>`
          : String(val ?? "—")
      }</span>`
    ).join("")}</div>`;
  }
  return String(v ?? "—");
}

// --- Semestre toggle ---
document.getElementById("view-pretty").addEventListener("click", e => {
  if (e.target.closest(".sem-export-btn")) return;
  const header = e.target.closest(".sem-header");
  if (header) header.closest(".sem-card").classList.toggle("collapsed");
});

// --- Export semestre ---
function exportSemester(e, btn) {
  e.stopPropagation();
  const card = btn.closest(".sem-card");
  document.querySelectorAll(".sem-card").forEach(c => c.classList.remove("printing-target"));
  card.classList.add("printing-target");
  document.body.classList.add("printing");
  window.print();
  document.body.classList.remove("printing");
  card.classList.remove("printing-target");
}

// --- Init ---
document.getElementById("year-select").value = "2025";
updateToolbar();
fetchData();
</script>
</body>
</html>
